<nav class="bg-white border-b border-gray-200 px-6 py-3 flex items-center gap-6 shadow-sm">
  <span class="text-xl font-bold text-gray-800 mr-4">🧁 Petitfour</span>

  @for (item of navItems; track item.path) {
    <a
      [routerLink]="item.path"
      routerLinkActive="text-indigo-600 font-semibold border-b-2 border-indigo-500"
      [routerLinkActiveOptions]="{ exact: item.exact }"
      class="text-gray-600 hover:text-indigo-600 pb-1 transition-colors text-sm"
    >
      {{ item.label }}
    </a>
  }
</nav>
